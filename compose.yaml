services:
  virtual-display:
    build:
      context: .
      args:
        REACT_APP_VIRTUAL_API_BASE_URL: ${REACT_APP_VIRTUAL_API_BASE_URL:-http://localhost:3000}
        REACT_APP_VIRTUAL_TICKETS_API: ${REACT_APP_VIRTUAL_TICKETS_API:-http://127.0.0.1:5088}
        REACT_APP_TERMINAL_CODE: ${REACT_APP_TERMINAL_CODE:-}
        REACT_APP_DISPLAY_VERSION: ${REACT_APP_DISPLAY_VERSION:-1.0.0}
    ports:
      - "${DISPLAY_PORT:-3001}:80"
    restart: unless-stopped

