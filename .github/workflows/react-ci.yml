name: React CI and Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: virtualdisplay

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React application
        env:
          CI: "false"
          REACT_APP_VIRTUAL_TICKETS_API: http://45.77.54.107:10020
          REACT_APP_VIRTUAL_API_BASE_URL: http://45.77.54.107:10006
          REACT_APP_TERMINAL_CODE: DISPLAY-001
          REACT_APP_DISPLAY_VERSION: 1.0.0
        run: npm run build

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-and-test

    # Pull requests build/test but do not publish images.
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository owner to lowercase
        id: image
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repository=ghcr.io/$OWNER/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:latest
            ${{ steps.image.outputs.repository }}:${{ github.sha }}
          build-args: |
            REACT_APP_VIRTUAL_TICKETS_API=http://45.77.54.107:10020
            REACT_APP_VIRTUAL_API_BASE_URL=http://45.77.54.107:10006
            REACT_APP_TERMINAL_CODE=DISPLAY-001
            REACT_APP_DISPLAY_VERSION=1.0.0
          cache-from: type=gha
          cache-to: type=gha,mode=max